name: Aggiornamento Daily App
on:
  schedule:
    - cron: '0 7 * * *' # Avvia alle 7:00 UTC (9:00 in Italia)
  workflow_dispatch: # Permette di avviarlo manualmente
jobs:
  update-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Installa librerie
        run: pip install google-generativeai
      - name: Avvia il Motore
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update.py
      - name: Salva e Pubblica il nuovo Sito
        run: |
          git config --global user.name 'Automazione Daily Pro'
          git config --global user.email 'action@github.com'
          git add index.html
          git commit -m "Aggiornamento quotidiano" || exit 0
          git push
